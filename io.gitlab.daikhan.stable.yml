app-id: io.gitlab.daikhan.stable
command: daikhan
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk

finish-args:
  - --share=ipc
  - --share=network
  - --device=dri
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --own-name=org.mpris.MediaPlayer2.daikhan

modules:
  - name: daikhan
    buildsystem: meson
    builddir: true
    config-opts:
      - -Dprofile=stable
    sources:
      - type: archive
        url: https://gitlab.com/daikhan/daikhan/-/archive/0.1-alpha6/daikhan-0.1-alpha6.tar.bz2
        sha256: cecf19d3f2fa972cbd2b022332b414b4426880f3405d742f39499ed793261e38
